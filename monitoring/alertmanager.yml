# Alertmanager — routes alerts to a Telegram chat by default. Fill in the bot
# token + chat id (a dedicated alerts bot is recommended, not the user-facing one).
# A Slack/PagerDuty receiver can be added the same way.
route:
  receiver: telegram
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers: [severity="critical"]
      receiver: telegram
      repeat_interval: 30m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "${ALERT_BOT_TOKEN}"  # FIX: H12 - requires --config.expand-env=true
        chat_id: ${ALERT_CHAT_ID}  # FIX: H12 - was 0 (invalid); use env var (negative for groups)
        api_url: "https://api.telegram.org"
        parse_mode: HTML
        send_resolved: true
