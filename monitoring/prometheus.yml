global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Core API custom metrics (api/routers/health.py:/metrics). Scraped on the private
  # compose network — Caddy blocks /metrics publicly.
  #
  # FIX: AUDIT-M7 - IMPORTANT: on a PUBLIC deploy the app REQUIRES METRICS_TOKEN
  # (core/config.py) and /metrics returns 403 without it, so this scrape WILL fail
  # (silently → no aibot_* metrics, ApiDown never fires) unless you set the token
  # here. Prometheus does NOT expand env vars in this file, so you must inject the
  # real value at deploy time (this file is mounted read-only into the container).
  # Set it to the SAME value as METRICS_TOKEN in .env, e.g. via your deploy tooling.
  # PREFERRED: send it as an Authorization: Bearer header so the token never lands in
  # the scrape URL / access logs (the query-param form below still works but is legacy):
  #   authorization:
  #     credentials: "<METRICS_TOKEN value>"
  # Do NOT commit the real token to the repo.
  - job_name: aibot-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    # authorization:
    #   credentials: "REPLACE_AT_DEPLOY_WITH_METRICS_TOKEN"
    # Legacy query-param form (leaks into logs — prefer the header above):
    # params:
    #   token: ["REPLACE_AT_DEPLOY_WITH_METRICS_TOKEN"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # FIX: AUDIT-M6 - host CPU/mem/disk metrics for the DiskFull / HostMemoryHigh alerts.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
