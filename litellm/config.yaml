# LiteLLM proxy config — a self-hosted, OpenAI-compatible gateway that unifies
# 100+ LLM providers behind ONE endpoint + master key. The bot/api/worker reach it
# in-network at http://litellm:4000/v1.
#
# How it fits this project:
#   1. Put your real provider keys here (or in the litellm service env / its own UI).
#   2. In the admin panel → AI-routing, add an AIAccount with:
#        kind = litellm, base_url = http://litellm:4000/v1, api_key = <LITELLM_MASTER_KEY>
#   3. Pin a model to LiteLLM by setting that AIModel's backend = litellm (account_kind),
#      or leave it "any" to let LiteLLM/OmniRoute share the pool by tier/priority.
#   `model_name` below is what you send as the upstream_model in the model catalog.
#
# Keys are read from the litellm container env (os.environ/...) so they aren't
# duplicated in this file. Edit the model_list to match the providers you use.

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

litellm_settings:
  drop_params: true          # ignore params a given provider doesn't support
  # set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Optional: persist spend/usage to Postgres so the admin "spend" view can read it.
  # database_url: os.environ/LITELLM_DATABASE_URL
