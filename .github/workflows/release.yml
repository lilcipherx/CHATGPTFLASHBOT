name: Release

# Build + publish the Docker image to GHCR on a version tag (vX.Y.Z), then
# (optionally) trigger a deploy. Deploy is gated on the DEPLOY_WEBHOOK secret so
# the pipeline is inert until you wire a target — no code change needed.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    # NOTE: `needs:` may only reference jobs in THIS workflow — the earlier
    # `needs: [lint, test]` pointed at ci.yml jobs, which makes the workflow invalid
    # (GitHub can't resolve them) and the run fails at startup. CI already gates the
    # merge into `main` via branch protection, and release tags are cut from `main`,
    # so the image built here is always from CI-green code. (To hard-gate on the CI
    # run itself, switch to a `workflow_run` trigger.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy (only if configured)
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK}" ]; then
            echo "DEPLOY_WEBHOOK not set — skipping deploy. Add the secret to enable."
            exit 0
          fi
          curl -fsSL -X POST "${DEPLOY_WEBHOOK}" \
            -H 'Content-Type: application/json' \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\",\"sha\":\"${GITHUB_SHA}\"}"
