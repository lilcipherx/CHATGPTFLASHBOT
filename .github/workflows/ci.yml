name: CI

on:
  push:
    branches: [main, "feat/**", "chore/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zero-infra test config: SQLite + in-memory Redis (fakeredis), dummy bot token.
  DATABASE_URL: "sqlite+aiosqlite:///./ci.db"
  REDIS_URL: "memory://"
  BOT_TOKEN: "123:ci"
  ENV: "test"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.17
      - name: Ruff lint (gate)
        run: ruff check .
      - name: Ruff format check (informational — tree is hand-formatted)
        run: ruff format --check . || true

  typecheck:
    # Informational: the codebase is not yet fully mypy-clean. Non-blocking so it
    # surfaces regressions without gating merges. Tighten over time.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: mypy core api bot workers --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Pytest + coverage
        run: |
          pytest --cov=core --cov=api --cov=bot --cov=workers \
                 --cov-report=xml --cov-report=term-missing -q
      - name: Coverage floor (ratchet — raise over time toward 70 global / 85 critical)
        run: |
          python -m coverage report --fail-under=65
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Alembic upgrade head (fresh SQLite)
        run: alembic upgrade head
      - name: Models match migrations (no un-migrated drift)
        run: python -m scripts.check_migrations

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [miniapp, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install
        working-directory: ${{ matrix.app }}
        run: npm ci || npm install
      - name: Unit tests (Vitest)
        working-directory: ${{ matrix.app }}
        run: npm run test --if-present
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
      # Playwright e2e (miniapp only — it owns playwright.config.ts + e2e/). The specs
      # build+preview the SPA and mock the backend via page.route, so no live API is
      # needed. Deterministic and fast; catches shell/gate/render regressions.
      - name: Install Playwright browsers (miniapp)
        if: ${{ matrix.app == 'miniapp' }}
        working-directory: miniapp
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright, miniapp)
        if: ${{ matrix.app == 'miniapp' }}
        working-directory: miniapp
        run: npm run e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt --strict  # FIX: AUDIT-138
      - name: Static security scan (bandit)
        run: bandit -r core api bot workers -ll -q  # FIX: AUDIT-138

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aibot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
