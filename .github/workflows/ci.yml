name: CI

on:
  push:
    branches: [main, "feat/**", "chore/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zero-infra test config: SQLite + in-memory Redis (fakeredis), dummy bot token.
  DATABASE_URL: "sqlite+aiosqlite:///./ci.db"
  REDIS_URL: "memory://"
  BOT_TOKEN: "123:ci"
  ENV: "test"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.17
      - name: Ruff lint (gate)
        run: ruff check .
      - name: Ruff format check (informational — tree is hand-formatted)
        run: ruff format --check . || true

  typecheck:
    # Informational: the codebase is not yet fully mypy-clean. Non-blocking so it
    # surfaces regressions without gating merges. Tighten over time.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: mypy core api bot workers --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Pytest + coverage
        run: |
          pytest --cov=core --cov=api --cov=bot --cov=workers \
                 --cov-report=xml --cov-report=term-missing -q
      - name: Coverage floor (ratchet — raise over time toward 70 global / 85 critical)
        run: |
          python -m coverage report --fail-under=67  # ratchet: raised 65→67 (actual 67.96%)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Generation pipeline e2e (chat/photo/video/music vs mock AI server)
        # Boots scripts.mock_ai_server and drives request->job->worker->provider->
        # delivery for every modality with zero real keys. Fails the build on any
        # pipeline regression. See scripts/e2e_pipeline_check.py.
        run: python scripts/e2e_pipeline_check.py

  money-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Money-flow e2e (signed webhook -> activation -> refund vs mock gateway)
        # Drives the real payment pipeline: signature verify, apply_event activation,
        # idempotency, amount-tamper rejection, credit purchase, refund. No real
        # gateway/Telegram. See scripts/money_flow_check.py.
        run: python scripts/money_flow_check.py

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Alembic upgrade head (fresh SQLite)
        run: alembic upgrade head
      - name: Models match migrations (no un-migrated drift)
        run: python -m scripts.check_migrations

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [miniapp, admin]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install
        working-directory: ${{ matrix.app }}
        run: npm ci || npm install
      - name: Unit tests (Vitest)
        working-directory: ${{ matrix.app }}
        run: npm run test --if-present
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
      # Playwright e2e (miniapp only — it owns playwright.config.ts + e2e/). The specs
      # build+preview the SPA and mock the backend via page.route, so no live API is
      # needed. Deterministic and fast; catches shell/gate/render regressions.
      - name: Install Playwright browsers (miniapp)
        if: ${{ matrix.app == 'miniapp' }}
        working-directory: miniapp
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright, miniapp)
        if: ${{ matrix.app == 'miniapp' }}
        working-directory: miniapp
        run: npm run e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt --strict  # FIX: AUDIT-138
      - name: Static security scan (bandit)
        run: bandit -r core api bot workers -ll -q  # FIX: AUDIT-138

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: aibot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
